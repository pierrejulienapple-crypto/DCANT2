<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DCANT Icon Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,400&display=swap" rel="stylesheet">
<style>
body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
h1 { margin-bottom: 8px; }
p { color: #666; margin-bottom: 30px; }
.row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
.item { text-align: center; }
.item canvas { border: 1px solid #ccc; }
.item a { display: block; margin-top: 8px; font-size: 13px; color: #1a2744; }
</style>
</head>
<body>
<h1>DCANT — Generateur d'icones PWA</h1>
<p>Cliquez sur chaque lien "Telecharger" pour sauvegarder les PNG, puis placez-les dans le dossier <code>/icons/</code>.</p>
<div class="row" id="row"></div>

<script>
document.fonts.ready.then(() => {
  const icons = [
    { name: 'icon-192.png', size: 192, maskable: false },
    { name: 'icon-512.png', size: 512, maskable: false },
    { name: 'icon-192-maskable.png', size: 192, maskable: true },
    { name: 'icon-512-maskable.png', size: 512, maskable: true },
    { name: 'apple-touch-icon.png', size: 180, maskable: false },
  ];

  icons.forEach(icon => {
    const canvas = document.createElement('canvas');
    canvas.width = icon.size;
    canvas.height = icon.size;
    const ctx = canvas.getContext('2d');

    // Fond navy
    ctx.fillStyle = '#1a2744';
    ctx.fillRect(0, 0, icon.size, icon.size);

    // "D" en Fraunces italic blanc
    const fontSize = icon.maskable ? icon.size * 0.48 : icon.size * 0.58;
    ctx.font = `italic ${fontSize}px Fraunces`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('D', icon.size / 2, icon.size / 2 + (icon.size * 0.02));

    // Affiche
    const div = document.createElement('div');
    div.className = 'item';

    const displayCanvas = document.createElement('canvas');
    displayCanvas.width = 96;
    displayCanvas.height = 96;
    const dctx = displayCanvas.getContext('2d');
    dctx.drawImage(canvas, 0, 0, 96, 96);
    div.appendChild(displayCanvas);

    const label = document.createElement('div');
    label.textContent = `${icon.name} (${icon.size}x${icon.size})`;
    label.style.fontSize = '12px';
    label.style.marginTop = '6px';
    div.appendChild(label);

    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = icon.name;
    a.textContent = 'Telecharger';
    div.appendChild(a);

    document.getElementById('row').appendChild(div);
  });
});
</script>
</body>
</html>
