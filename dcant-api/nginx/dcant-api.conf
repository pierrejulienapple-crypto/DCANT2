# DCANT API — Nginx reverse proxy
# Copier dans /etc/nginx/sites-available/ puis symlink dans sites-enabled
# Remplacer api.dcant.fr par votre domaine

server {
    listen 80;
    server_name api.dcant.fr;

    # Certbot va ajouter la config TLS automatiquement
    # sudo certbot --nginx -d api.dcant.fr

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout pour les appels IA (longue durée)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Limite body (images base64 pour IA)
        client_max_body_size 10m;
    }
}
